<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" width="720" height="220" role="img" aria-label="Aurelune colour palette">
  <title>Aurelune — colour palette</title>
  <style>
    .label { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 11px; fill: #1B1B1F; letter-spacing: 0.5px; }
    .hex { font-family: 'Söhne Mono', 'Menlo', monospace; font-size: 10px; fill: #5C5A7A; }
    .token { font-family: 'Söhne Mono', 'Menlo', monospace; font-size: 9px; fill: #5C5A7A; letter-spacing: 0.5px; }
  </style>
  <rect x="0" y="0" width="720" height="220" fill="#F2EDE4"/>

  <!-- Ink -->
  <rect x="20" y="20" width="100" height="120" fill="#1B1B1F"/>
  <text x="20" y="160" class="label">Ink</text>
  <text x="20" y="176" class="hex">#1B1B1F</text>
  <text x="20" y="192" class="token">aurelune.ink</text>

  <!-- Bone -->
  <rect x="135" y="20" width="100" height="120" fill="#F2EDE4" stroke="#D8D5CE" stroke-width="1"/>
  <text x="135" y="160" class="label">Bone</text>
  <text x="135" y="176" class="hex">#F2EDE4</text>
  <text x="135" y="192" class="token">aurelune.bone</text>

  <!-- Dawn -->
  <rect x="250" y="20" width="100" height="120" fill="#E8C9A3"/>
  <text x="250" y="160" class="label">Dawn</text>
  <text x="250" y="176" class="hex">#E8C9A3</text>
  <text x="250" y="192" class="token">aurelune.dawn</text>

  <!-- Dusk -->
  <rect x="365" y="20" width="100" height="120" fill="#5C5A7A"/>
  <text x="365" y="160" class="label">Dusk</text>
  <text x="365" y="176" class="hex">#5C5A7A</text>
  <text x="365" y="192" class="token">aurelune.dusk</text>

  <!-- Signal -->
  <rect x="480" y="20" width="100" height="120" fill="#C84F2A"/>
  <text x="480" y="160" class="label">Signal</text>
  <text x="480" y="176" class="hex">#C84F2A</text>
  <text x="480" y="192" class="token">aurelune.signal</text>

  <!-- Mist -->
  <rect x="595" y="20" width="100" height="120" fill="#D8D5CE"/>
  <text x="595" y="160" class="label">Mist</text>
  <text x="595" y="176" class="hex">#D8D5CE</text>
  <text x="595" y="192" class="token">aurelune.mist</text>
</svg>
